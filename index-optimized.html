    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        *,
        *::before,
        *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg: #fff5f7;
            --bg-sidebar: #ffffff;
            --bg-card: rgba(255, 255, 255, 0.85);
            --bg-glass: rgba(255, 255, 255, 0.6);
            --border: rgba(236, 168, 185, 0.2);
            --border-hover: rgba(236, 112, 140, 0.4);
            --text-primary: #2d1f30;
            --text-secondary: #6b5570;
            --text-muted: #ae8fad;
            --sakura: #ec708c;
            --sakura-light: #f9b8c6;
            --sakura-soft: #fce4ec;
            --sakura-deep: #d4536a;
            --shadow-card: 0 2px 16px rgba(236, 112, 140, 0.06);
            --shadow-hover: 0 8px 32px rgba(236, 112, 140, 0.12);
            --font: 'Inter', 'Noto Sans SC', -apple-system, sans-serif;
            --radius: 14px;
            --radius-sm: 10px;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            font-family: var(--font);
            background: var(--bg);
            color: var(--text-secondary);
            height: 100vh;
            overflow: hidden;
            display: flex;
            font-size: 14px;
            line-height: 1.6;
            -webkit-font-smoothing: antialiased;
        }

        /* ===== 樱花花瓣粒子 (CSS only) ===== */
        .petals {
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 0;
            overflow: hidden;
        }

        .petal {
            position: absolute;
            width: 10px;
            height: 10px;
            background: radial-gradient(circle, var(--sakura-light), rgba(252, 228, 236, 0));
            border-radius: 50% 0 50% 50%;
            opacity: 0;
            animation: petalFall linear infinite;
        }

        .petal:nth-child(1) {
            left: 10%;
            animation-duration: 12s;
            animation-delay: 0s;
            width: 8px;
            height: 8px;
        }

        .petal:nth-child(2) {
            left: 25%;
            animation-duration: 15s;
            animation-delay: 2s;
            width: 12px;
            height: 12px;
        }

        .petal:nth-child(3) {
            left: 40%;
            animation-duration: 11s;
            animation-delay: 4s;
        }

        .petal:nth-child(4) {
            left: 55%;
            animation-duration: 14s;
            animation-delay: 1s;
            width: 7px;
            height: 7px;
        }

        .petal:nth-child(5) {
            left: 70%;
            animation-duration: 13s;
            animation-delay: 3s;
            width: 11px;
            height: 11px;
        }

        .petal:nth-child(6) {
            left: 85%;
            animation-duration: 16s;
            animation-delay: 5s;
            width: 9px;
            height: 9px;
        }

        .petal:nth-child(7) {
            left: 15%;
            animation-duration: 10s;
            animation-delay: 6s;
            width: 6px;
            height: 6px;
        }

        .petal:nth-child(8) {
            left: 60%;
            animation-duration: 17s;
            animation-delay: 7s;
            width: 13px;
            height: 13px;
        }

        @keyframes petalFall {
            0% {
                top: -5%;
                opacity: 0;
                transform: rotate(0deg) translateX(0);
            }

            10% {
                opacity: 0.7;
            }

            90% {
                opacity: 0.4;
            }

            100% {
                top: 105%;
                opacity: 0;
                transform: rotate(720deg) translateX(80px);
            }
        }

        /* ===== 加载 ===== */
        #loading-overlay {
            position: fixed;
            inset: 0;
            background: var(--bg);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 9999;
            transition: opacity 0.5s, visibility 0.5s;
        }

        #loading-overlay.hidden {
            opacity: 0;
            visibility: hidden;
        }

        .loader-ring {
            width: 40px;
            height: 40px;
            border: 3px solid var(--sakura-soft);
            border-top-color: var(--sakura);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        /* ===== 滚动条 ===== */
        ::-webkit-scrollbar {
            width: 5px;
        }

        ::-webkit-scrollbar-track {
            background: transparent;
        }

        ::-webkit-scrollbar-thumb {
            background: var(--sakura-light);
            border-radius: 3px;
        }

        /* ===== 侧边栏 ===== */
        .sidebar {
            width: 256px;
            background: var(--bg-sidebar);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            z-index: 50;
            flex-shrink: 0;
            transition: transform 0.25s;
            box-shadow: 1px 0 8px rgba(236, 112, 140, 0.03);
        }

        .sidebar-head {
            height: 58px;
            display: flex;
            align-items: center;
            padding: 0 18px;
            border-bottom: 1px solid var(--border);
            cursor: pointer;
            flex-shrink: 0;
        }

        .s-logo {
            width: 32px;
            height: 32px;
            background: linear-gradient(135deg, var(--sakura), var(--sakura-deep));
            border-radius: 9px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
            font-size: 14px;
            margin-right: 10px;
            box-shadow: 0 3px 12px rgba(236, 112, 140, 0.25);
        }

        .s-title {
            font-size: 1.1em;
            font-weight: 800;
            color: var(--sakura-deep);
            letter-spacing: -0.3px;
        }

        .s-ver {
            font-size: 9px;
            background: var(--sakura-soft);
            color: var(--sakura);
            padding: 2px 6px;
            border-radius: 5px;
            margin-left: 8px;
            font-weight: 700;
            font-family: monospace;
        }

        .sidebar-nav {
            flex: 1;
            overflow-y: auto;
            padding: 10px;
        }

        .qq-card {
            margin-bottom: 12px;
            padding: 11px 13px;
            border-radius: var(--radius-sm);
            background: var(--sakura-soft);
            border: 1px solid rgba(236, 112, 140, 0.12);
            cursor: pointer;
            transition: all 0.2s;
        }

        .qq-card:hover {
            border-color: var(--border-hover);
            transform: translateY(-1px);
            box-shadow: var(--shadow-card);
        }

        .qq-top {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .qq-label {
            font-size: 11px;
            font-weight: 700;
            color: var(--sakura);
        }

        .qq-icon {
            color: var(--sakura-light);
        }

        .qq-num {
            font-size: 17px;
            font-weight: 800;
            color: var(--text-primary);
            margin-top: 3px;
            font-family: 'Inter', monospace;
            letter-spacing: 0.5px;
        }

        .nav-group {
            font-size: 10px;
            font-weight: 800;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.1em;
            padding: 16px 10px 5px;
        }

        .nav-btn {
            width: 100%;
            text-align: left;
            padding: 8px 11px;
            border-radius: var(--radius-sm);
            border: none;
            background: transparent;
            color: var(--text-secondary);
            font-family: var(--font);
            font-size: 13px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: space-between;
            transition: all 0.2s;
            margin-bottom: 1px;
        }

        .nav-btn:hover {
            background: var(--sakura-soft);
            color: var(--text-primary);
        }

        .nav-btn.active {
            background: linear-gradient(135deg, var(--sakura), var(--sakura-deep));
            color: #fff;
            font-weight: 600;
            box-shadow: 0 3px 12px rgba(236, 112, 140, 0.2);
        }

        .nav-btn i {
            width: 20px;
            text-align: center;
            margin-right: 8px;
            font-size: 12px;
        }

        .nav-count {
            font-size: 10px;
            background: rgba(0, 0, 0, 0.03);
            padding: 2px 7px;
            border-radius: 5px;
            color: var(--text-muted);
        }

        .nav-btn.active .nav-count {
            background: rgba(255, 255, 255, 0.2);
            color: rgba(255, 255, 255, 0.85);
        }

        .sidebar-foot {
            padding: 10px 14px 14px;
            flex-shrink: 0;
        }

        .sidebar-foot a {
            display: block;
            text-align: center;
            padding: 7px;
            font-size: 11px;
            color: var(--text-muted);
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            text-decoration: none;
            transition: all 0.2s;
        }

        .sidebar-foot a:hover {
            color: var(--sakura);
            border-color: var(--border-hover);
            background: var(--sakura-soft);
        }

        /* ===== 主区域 ===== */
        .main-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            height: 100%;
            position: relative;
            z-index: 1;
        }

        .top-bar {
            height: 58px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            padding: 0 24px;
            gap: 12px;
            background: rgba(255, 245, 247, 0.85);
            backdrop-filter: blur(16px);
            z-index: 20;
            flex-shrink: 0;
        }

        .mobile-toggle {
            display: none;
            background: none;
            border: none;
            color: var(--text-secondary);
            font-size: 17px;
            cursor: pointer;
        }

        .search-wrap {
            flex: 1;
            max-width: 440px;
            position: relative;
        }

        .search-wrap i {
            position: absolute;
            left: 14px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted);
            font-size: 13px;
        }

        .search-wrap input {
            width: 100%;
            padding: 9px 16px 9px 38px;
            border-radius: 24px;
            border: 1px solid var(--border);
            background: var(--bg-glass);
            color: var(--text-primary);
            font-size: 13px;
            font-family: var(--font);
            outline: none;
            transition: all 0.3s;
        }

        .search-wrap input:focus {
            border-color: var(--sakura);
            box-shadow: 0 0 0 3px rgba(236, 112, 140, 0.08);
        }

        .search-wrap input::placeholder {
            color: var(--text-muted);
        }

        .top-actions {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .top-actions button {
            background: none;
            border: none;
            color: var(--text-muted);
            font-size: 15px;
            cursor: pointer;
            transition: color 0.2s;
        }

        .top-actions button:hover {
            color: var(--sakura);
        }

        .db-badge {
            font-size: 11px;
            font-family: monospace;
            color: var(--text-muted);
            background: var(--bg-glass);
            border: 1px solid var(--border);
            padding: 4px 10px;
            border-radius: 8px;
        }

        .db-badge .num {
            color: var(--sakura);
            font-weight: 700;
        }

        /* Content */
        .content-scroll {
            flex: 1;
            overflow-y: auto;
            padding: 28px 32px;
        }

        .cat-title {
            font-size: 1.5em;
            font-weight: 800;
            color: var(--text-primary);
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 8px;
            letter-spacing: -0.3px;
        }

        .cat-title i {
            color: var(--sakura);
            font-size: 0.85em;
        }

        .cat-title .cat-count {
            font-size: 0.45em;
            font-weight: 500;
            color: var(--text-muted);
        }

        /* Grid */
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(270px, 1fr));
            gap: 14px;
            padding-bottom: 60px;
        }

        /* Card */
        .card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 16px 18px;
            position: relative;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            height: 100%;
            transition: all 0.25s ease;
            box-shadow: var(--shadow-card);
            backdrop-filter: blur(8px);
            opacity: 0;
            animation: cardIn 0.4s ease forwards;
        }

        .card:hover {
            transform: translateY(-4px);
            border-color: var(--border-hover);
            box-shadow: var(--shadow-hover);
        }

        @keyframes cardIn {
            from {
                opacity: 0;
                transform: translateY(12px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .card-top {
            display: flex;
            align-items: center;
            gap: 11px;
            margin-bottom: 10px;
        }

        .card-icon {
            width: 38px;
            height: 38px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--sakura-soft);
            color: var(--sakura);
            font-size: 15px;
            flex-shrink: 0;
        }

        .card-name {
            font-size: 13.5px;
            font-weight: 700;
            color: var(--text-primary);
            flex: 1;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            padding-right: 20px;
            transition: color 0.2s;
            letter-spacing: -0.2px;
        }

        .card:hover .card-name {
            color: var(--sakura);
        }

        .card-desc {
            font-size: 12px;
            color: var(--text-secondary);
            line-height: 1.65;
            flex-grow: 1;
            margin-bottom: 10px;
        }

        .card-bottom {
            padding-top: 9px;
            border-top: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .card-cat {
            font-size: 10px;
            background: var(--sakura-soft);
            color: var(--text-muted);
            padding: 2px 7px;
            border-radius: 5px;
            font-weight: 600;
        }

        .card-actions {
            display: flex;
            gap: 7px;
            opacity: 0;
            transition: opacity 0.2s;
        }

        .card:hover .card-actions {
            opacity: 1;
        }

        .card-actions span {
            color: var(--text-muted);
            cursor: pointer;
            font-size: 11px;
            transition: color 0.15s;
        }

        .card-actions span:hover {
            color: var(--sakura);
        }

        /* Badge */
        .badge {
            position: absolute;
            top: 9px;
            right: 9px;
            font-size: 10px;
            font-weight: 700;
            padding: 2px 7px;
            border-radius: 5px;
            border: 1px solid;
        }

        .badge-hot {
            background: rgba(236, 112, 140, 0.08);
            color: var(--sakura-deep);
            border-color: rgba(236, 112, 140, 0.2);
        }

        .badge-good {
            background: rgba(16, 185, 129, 0.06);
            color: #059669;
            border-color: rgba(16, 185, 129, 0.15);
        }

        .badge-other {
            background: rgba(99, 102, 241, 0.06);
            color: #6366f1;
            border-color: rgba(99, 102, 241, 0.15);
        }

        .empty {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-muted);
            grid-column: 1 / -1;
        }

        .empty .icon {
            font-size: 3em;
            margin-bottom: 10px;
        }

        /* Toast */
        #toast {
            position: fixed;
            top: 72px;
            right: 20px;
            z-index: 9999;
            pointer-events: none;
        }

        .toast-item {
            background: var(--sakura);
            color: #fff;
            font-weight: 600;
            font-size: 12px;
            padding: 9px 16px;
            border-radius: var(--radius-sm);
            margin-bottom: 8px;
            box-shadow: 0 4px 16px rgba(236, 112, 140, 0.25);
            animation: toastIn 0.3s ease;
        }

        .toast-item.error {
            background: #ef4444;
            box-shadow: 0 4px 16px rgba(239, 68, 68, 0.25);
        }

        @keyframes toastIn {
            from {
                opacity: 0;
                transform: translateX(20px);
            }

            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        /* ===== 响应式 ===== */
        @media (max-width: 768px) {
            .sidebar {
                position: fixed;
                top: 0;
                bottom: 0;
                left: 0;
                transform: translateX(-100%);
            }

            .sidebar.open {
                transform: translateX(0);
            }

            .mobile-toggle {
                display: block;
            }

            .content-scroll {
                padding: 20px 16px;
            }

            .grid {
                grid-template-columns: 1fr;
            }

            .db-badge {
                display: none;
            }

            .overlay {
                position: fixed;
                inset: 0;
                background: rgba(0, 0, 0, 0.2);
                z-index: 49;
                display: none;
            }

            .overlay.show {
                display: block;
            }
        }
    </style>
</head>

            </div>
            <div class="top-actions">
                <button onclick="randomSite()" title="手气不错"><i class="fa-solid fa-dice"></i></button>
                <span class="db-badge">DB: <span class="num" id="total-db">0</span></span>
            </div>
        </header>
        <div class="content-scroll" id="content-area">
            <h2 class="cat-title" id="cat-title"><i class="fa-solid fa-layer-group"></i> 全部资源</h2>
            <div class="grid" id="grid"></div>
        </div>
    </main>

    <div id="toast"></div>

    <script>
        let db = [], currentCategory = 'all';
        const CN = { all: '全部资源', movies: '影视与聚合', anime: '动漫与漫画', games: '游戏与模拟', music: '音乐与有声', iptv: '直播与IPTV', tools: '软件与工具', ai: '人工智能', dev: '开发与编程', design: '设计与素材', android: '安卓发烧友', privacy: '隐私与安全', pan: '网盘与资源' };

        async function init() {
            try {
                const r = await fetch('data.json'); if (!r.ok) throw 0;
                db = await r.json();
                document.getElementById('total-db').innerText = db.length;
                updateCounts(); render(db); setupSearch();
                document.addEventListener('keydown', e => { if ((e.ctrlKey || e.metaKey) && e.key === 'k') { e.preventDefault(); document.getElementById('search').focus(); } });
                setTimeout(() => document.getElementById('loading-overlay').classList.add('hidden'), 350);
            } catch (e) { showToast('加载失败，请刷新', true); document.getElementById('loading-overlay').classList.add('hidden'); }
        }

        function updateCounts() {
            const c = {}; db.forEach(i => c[i.c] = (c[i.c] || 0) + 1);
            const a = document.getElementById('c-all'); if (a) a.innerText = db.length;
            for (let k in c) { const e = document.getElementById('c-' + k); if (e) e.innerText = c[k]; }
        }

        function filter(cat, btn) {
            currentCategory = cat;
            const list = cat === 'all' ? db : db.filter(i => i.c === cat);
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            if (btn) btn.classList.add('active');
            if (window.innerWidth < 768) closeSidebar();
            document.getElementById('cat-title').innerHTML = `<i class="fa-solid fa-layer-group"></i> ${CN[cat] || '搜索结果'} <span class="cat-count">(${list.length})</span>`;
            render(list);
        }

        function render(list) {
            const g = document.getElementById('grid');
            if (!list.length) { g.innerHTML = '<div class="empty"><div class="icon">🌸</div><p>未找到相关资源</p></div>'; return; }
            g.innerHTML = list.map((it, i) => {
                const badge = it.badge ? `<span class="badge ${getBadgeClass(it.badge)}">${esc(it.badge)}</span>` : '';
                return `<div class="card" style="animation-delay:${Math.min(i * 0.025, 0.5)}s" onclick="openLink('${esc(it.u)}')">
                    ${badge}
                    <div class="card-top"><div class="card-icon"><i class="fa-solid ${it.i}"></i></div><div class="card-name">${esc(it.t)}</div></div>
                    <p class="card-desc">${esc(it.d)}</p>
                    <div class="card-bottom"><span class="card-cat">#${it.c.toUpperCase()}</span><div class="card-actions"><span onclick="copyLink('${esc(it.u)}',event)" title="复制链接"><i class="fa-regular fa-copy"></i></span><span><i class="fa-solid fa-arrow-up-right-from-square"></i></span></div></div>
                </div>`;
            }).join('');
        }

        function esc(s) { const d = document.createElement('div'); d.textContent = s || ''; return d.innerHTML; }
        function openLink(u) { window.open(u, '_blank', 'noopener,noreferrer'); }
        function getBadgeClass(b) { if (['热门', '神器', '必藏', '神站'].includes(b)) return 'badge-hot'; if (['新锐', 'FOSS', '推荐', '源头', '必读'].includes(b)) return 'badge-good'; return 'badge-other'; }
        function joinQQ() { const m = /Android|iPhone/i.test(navigator.userAgent); const u = m ? 'mqqapi://card/show_pslcard?src_type=internal&version=1&uin=691105381&card_type=group&source=qrcode' : 'https://qm.qq.com/q/cY9CE78ZMs'; m ? (location.href = u) : window.open(u, '_blank'); showToast('正在前往社区...'); }
        function copyLink(u, e) { e.stopPropagation(); navigator.clipboard.writeText(u).then(() => showToast('链接已复制')).catch(() => showToast('复制失败', true)); }
        function showToast(msg, err) { const t = document.createElement('div'); t.className = 'toast-item' + (err ? ' error' : ''); t.textContent = msg; document.getElementById('toast').appendChild(t); setTimeout(() => t.remove(), 2200); }
        function randomSite() { if (!db.length) { showToast('加载中...', true); return; } const r = db[Math.floor(Math.random() * db.length)]; showToast('正在前往: ' + r.t); setTimeout(() => window.open(r.u, '_blank'), 500); }

        function setupSearch() { document.getElementById('search').addEventListener('input', e => { const v = e.target.value.toLowerCase().trim(); if (!v) { filter(currentCategory, document.querySelector('.nav-btn.active')); return; } const list = db.filter(i => i.t.toLowerCase().includes(v) || i.d.toLowerCase().includes(v)); document.getElementById('cat-title').innerHTML = `<i class="fa-solid fa-magnifying-glass"></i> 搜索结果 <span class="cat-count">(${list.length})</span>`; render(list); }); }
        function toggleSidebar() { document.getElementById('sidebar').classList.toggle('open'); document.getElementById('overlay').classList.toggle('show'); }
        function closeSidebar() { document.getElementById('sidebar').classList.remove('open'); document.getElementById('overlay').classList.remove('show'); }
        init();
    </script>
</body>

</html>
