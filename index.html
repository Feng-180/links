        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        *,
        *::before,
        *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-deep: #0c0618;
            --bg-sidebar: #100a20;
            --bg-card: rgba(25, 15, 45, 0.65);
            --bg-glass: rgba(255, 255, 255, 0.025);
            --border-subtle: rgba(167, 139, 250, 0.08);
            --border-glow: rgba(244, 114, 182, 0.3);
            --text-primary: #f5f0ff;
            --text-secondary: #b8a5d4;
            --text-muted: #6d5a8a;
            --sakura-pink: #f472b6;
            --sakura-purple: #a78bfa;
            --sakura-rose: #fb7185;
            --sakura-lavender: #c4b5fd;
            --sakura-fuchsia: #e879f9;
            --font: 'Inter', 'Noto Sans SC', -apple-system, sans-serif;
            --radius: 14px;
            --radius-sm: 10px;
        }

        body {
            font-family: var(--font);
            background: var(--bg-deep);
            color: var(--text-secondary);
            height: 100vh;
            overflow: hidden;
            display: flex;
            font-size: 14px;
            line-height: 1.5;
        }

        /* ===== 背景极光 ===== */
        .aurora {
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 0;
            overflow: hidden;
        }

        .aurora::before {
            content: '';
            position: absolute;
            width: 700px;
            height: 700px;
            top: -250px;
            left: -150px;
            background: radial-gradient(circle, rgba(167, 139, 250, 0.1), transparent 70%);
            animation: auroraFloat 20s ease-in-out infinite;
        }

        .aurora::after {
            content: '';
            position: absolute;
            width: 600px;
            height: 600px;
            bottom: -200px;
            right: -100px;
            background: radial-gradient(circle, rgba(244, 114, 182, 0.08), transparent 70%);
            animation: auroraFloat 25s ease-in-out infinite reverse;
        }

        @keyframes auroraFloat {

            0%,
            100% {
                transform: translate(0, 0) scale(1);
            }

            33% {
                transform: translate(80px, 50px) scale(1.1);
            }

            66% {
                transform: translate(-50px, 80px) scale(0.95);
            }
        }

        /* ===== 加载 ===== */
        #loading-overlay {
            position: fixed;
            inset: 0;
            background: var(--bg-deep);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 9999;
            transition: opacity 0.5s, visibility 0.5s;
        }

        #loading-overlay.hidden {
            opacity: 0;
            visibility: hidden;
        }

        .loader-ring {
            width: 44px;
            height: 44px;
            border: 3px solid rgba(167, 139, 250, 0.15);
            border-top-color: var(--sakura-pink);
            border-right-color: var(--sakura-purple);
            border-radius: 50%;
            animation: spin 0.9s linear infinite;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        /* ===== 滚动条 ===== */
        ::-webkit-scrollbar {
            width: 5px;
        }

        ::-webkit-scrollbar-track {
            background: transparent;
        }

        ::-webkit-scrollbar-thumb {
            background: rgba(167, 139, 250, 0.2);
            border-radius: 3px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: rgba(167, 139, 250, 0.35);
        }

        /* ===== 侧边栏 ===== */
        .sidebar {
            width: 260px;
            background: var(--bg-sidebar);
            border-right: 1px solid var(--border-subtle);
            display: flex;
            flex-direction: column;
            z-index: 50;
            position: relative;
            flex-shrink: 0;
            transition: transform 0.25s ease;
        }

        .sidebar-header-area {
            height: 60px;
            display: flex;
            align-items: center;
            padding: 0 20px;
            border-bottom: 1px solid var(--border-subtle);
            cursor: pointer;
            flex-shrink: 0;
        }

        .sidebar-logo {
            width: 34px;
            height: 34px;
            background: linear-gradient(135deg, var(--sakura-pink), var(--sakura-purple));
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
            font-size: 15px;
            margin-right: 12px;
            box-shadow: 0 4px 16px rgba(244, 114, 182, 0.25);
        }

        .sidebar-title {
            font-size: 1.15em;
            font-weight: 800;
            background: linear-gradient(135deg, var(--sakura-pink), var(--sakura-purple));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .sidebar-ver {
            font-size: 9px;
            background: rgba(244, 114, 182, 0.1);
            color: var(--sakura-pink);
            padding: 2px 6px;
            border-radius: 6px;
            margin-left: 8px;
            font-weight: 700;
            font-family: monospace;
        }

        .sidebar-nav {
            flex: 1;
            overflow-y: auto;
            padding: 12px;
        }

        /* QQ Card */
        .qq-card {
            margin-bottom: 14px;
            padding: 12px 14px;
            border-radius: var(--radius-sm);
            background: linear-gradient(135deg, rgba(244, 114, 182, 0.08), rgba(167, 139, 250, 0.08));
            border: 1px solid rgba(244, 114, 182, 0.15);
            cursor: pointer;
            position: relative;
            overflow: hidden;
            transition: all 0.25s;
        }

        .qq-card:hover {
            border-color: rgba(244, 114, 182, 0.35);
            background: linear-gradient(135deg, rgba(244, 114, 182, 0.12), rgba(167, 139, 250, 0.12));
            transform: translateY(-1px);
        }

        .qq-card-top {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .qq-label {
            font-size: 11px;
            font-weight: 700;
            color: var(--sakura-pink);
        }

        .qq-icon {
            color: var(--sakura-lavender);
        }

        .qq-num {
            font-size: 18px;
            font-weight: 800;
            color: var(--text-primary);
            margin-top: 4px;
            font-family: 'Inter', monospace;
        }

        /* Nav Group Label */
        .nav-group {
            font-size: 10px;
            font-weight: 800;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.1em;
            padding: 18px 10px 6px;
        }

        /* Nav Button */
        .nav-btn {
            width: 100%;
            text-align: left;
            padding: 9px 12px;
            border-radius: var(--radius-sm);
            border: none;
            background: transparent;
            color: var(--text-secondary);
            font-family: var(--font);
            font-size: 13px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: space-between;
            transition: all 0.2s;
            margin-bottom: 2px;
        }

        .nav-btn:hover {
            background: rgba(167, 139, 250, 0.06);
            color: var(--text-primary);
        }

        .nav-btn.active {
            background: linear-gradient(135deg, var(--sakura-pink), var(--sakura-purple));
            color: #fff;
            font-weight: 600;
            box-shadow: 0 3px 12px rgba(244, 114, 182, 0.2);
        }

        .nav-btn i {
            width: 22px;
            text-align: center;
            margin-right: 8px;
        }

        .nav-btn .nav-label {
            flex: 1;
        }

        .nav-count {
            font-size: 10px;
            background: rgba(255, 255, 255, 0.06);
            padding: 2px 7px;
            border-radius: 6px;
            color: var(--text-muted);
        }

        .nav-btn.active .nav-count {
            background: rgba(255, 255, 255, 0.2);
            color: rgba(255, 255, 255, 0.85);
        }

        .sidebar-footer {
            padding: 12px 16px 16px;
            flex-shrink: 0;
        }

        .sidebar-footer a {
            display: block;
            text-align: center;
            padding: 8px;
            font-size: 11px;
            color: var(--text-muted);
            border: 1px solid var(--border-subtle);
            border-radius: var(--radius-sm);
            text-decoration: none;
            transition: all 0.2s;
        }

        .sidebar-footer a:hover {
            color: var(--sakura-pink);
            border-color: var(--border-glow);
            background: rgba(244, 114, 182, 0.04);
        }

        /* ===== 主内容 ===== */
        .main-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            height: 100%;
            position: relative;
            z-index: 1;
        }

        /* Header */
        .top-bar {
            height: 60px;
            border-bottom: 1px solid var(--border-subtle);
            display: flex;
            align-items: center;
            padding: 0 24px;
            gap: 12px;
            background: rgba(12, 6, 24, 0.85);
            backdrop-filter: blur(16px);
            z-index: 20;
            flex-shrink: 0;
        }

        .mobile-toggle {
            display: none;
            background: none;
            border: none;
            color: var(--text-secondary);
            font-size: 18px;
            cursor: pointer;
            padding: 4px;
        }

        .search-wrap {
            flex: 1;
            max-width: 480px;
            position: relative;
        }

        .search-wrap i {
            position: absolute;
            left: 14px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted);
            font-size: 13px;
        }

        .search-wrap input {
            width: 100%;
            padding: 10px 16px 10px 40px;
            border-radius: 24px;
            border: 1px solid var(--border-subtle);
            background: var(--bg-glass);
            color: var(--text-primary);
            font-size: 13px;
            font-family: var(--font);
            outline: none;
            transition: all 0.3s;
        }

        .search-wrap input:focus {
            border-color: var(--border-glow);
            box-shadow: 0 0 0 3px rgba(244, 114, 182, 0.08);
        }

        .search-wrap input::placeholder {
            color: var(--text-muted);
        }

        .top-actions {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .top-actions button {
            background: none;
            border: none;
            color: var(--text-muted);
            font-size: 16px;
            cursor: pointer;
            transition: color 0.2s;
            padding: 4px;
        }

        .top-actions button:hover {
            color: var(--sakura-pink);
        }

        .db-badge {
            font-size: 11px;
            font-family: monospace;
            color: var(--text-muted);
            background: var(--bg-glass);
            border: 1px solid var(--border-subtle);
            padding: 4px 10px;
            border-radius: 8px;
        }

        .db-badge .num {
            color: var(--sakura-lavender);
            font-weight: 700;
        }

        /* Content Area */
        .content-scroll {
            flex: 1;
            overflow-y: auto;
            padding: 28px;
        }

        .cat-title {
            font-size: 1.6em;
            font-weight: 800;
            color: var(--text-primary);
            margin-bottom: 22px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .cat-title i {
            color: var(--sakura-pink);
        }

        .cat-title .cat-count {
            font-size: 0.5em;
            font-weight: 500;
            color: var(--text-muted);
        }

        /* Card Grid */
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 16px;
            padding-bottom: 60px;
        }

        /* Resource Card */
        .card {
            background: var(--bg-card);
            border: 1px solid var(--border-subtle);
            border-radius: var(--radius);
            padding: 18px 20px;
            position: relative;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            height: 100%;
            transition: all 0.3s cubic-bezier(0.25, 0.46, 0.45, 0.94);
            backdrop-filter: blur(10px);
            opacity: 0;
            animation: cardIn 0.45s ease forwards;
        }

        .card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 2px;
            background: linear-gradient(90deg, var(--sakura-pink), var(--sakura-purple));
            opacity: 0;
            transition: opacity 0.3s;
            border-radius: var(--radius) var(--radius) 0 0;
        }

        .card:hover {
            transform: translateY(-5px);
            border-color: var(--border-glow);
            box-shadow: 0 12px 40px rgba(0, 0, 0, 0.4), 0 0 20px rgba(244, 114, 182, 0.06);
        }

        .card:hover::before {
            opacity: 1;
        }

        @keyframes cardIn {
            from {
                opacity: 0;
                transform: translateY(14px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .card-top {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 12px;
        }

        .card-icon {
            width: 40px;
            height: 40px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, rgba(244, 114, 182, 0.1), rgba(167, 139, 250, 0.1));
            color: var(--sakura-pink);
            font-size: 16px;
            flex-shrink: 0;
        }

        .card-name {
            font-size: 14px;
            font-weight: 700;
            color: var(--text-primary);
            flex: 1;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            padding-right: 24px;
            transition: color 0.2s;
        }

        .card:hover .card-name {
            color: var(--sakura-pink);
        }

        .card-desc {
            font-size: 12px;
            color: var(--text-secondary);
            line-height: 1.65;
            flex-grow: 1;
            margin-bottom: 12px;
        }

        .card-bottom {
            padding-top: 10px;
            border-top: 1px solid var(--border-subtle);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .card-cat {
            font-size: 10px;
            background: rgba(167, 139, 250, 0.08);
            color: var(--text-muted);
            padding: 3px 8px;
            border-radius: 6px;
            font-weight: 600;
        }

        .card-actions {
            display: flex;
            gap: 8px;
            opacity: 0;
            transition: opacity 0.2s;
        }

        .card:hover .card-actions {
            opacity: 1;
        }

        .card-actions span {
            color: var(--text-muted);
            cursor: pointer;
            font-size: 11px;
            transition: color 0.15s;
        }

        .card-actions span:hover {
            color: var(--sakura-pink);
        }

        /* Badge */
        .badge {
            position: absolute;
            top: 10px;
            right: 10px;
            font-size: 10px;
            font-weight: 700;
            padding: 3px 8px;
            border-radius: 6px;
            border: 1px solid;
        }

        .badge-hot {
            background: rgba(251, 113, 133, 0.1);
            color: var(--sakura-rose);
            border-color: rgba(251, 113, 133, 0.2);
        }

        .badge-good {
            background: rgba(167, 139, 250, 0.1);
            color: var(--sakura-lavender);
            border-color: rgba(167, 139, 250, 0.2);
        }

        .badge-other {
            background: rgba(232, 121, 249, 0.1);
            color: var(--sakura-fuchsia);
            border-color: rgba(232, 121, 249, 0.2);
        }

        /* Empty */
        .empty {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-muted);
            grid-column: 1 / -1;
        }

        .empty .icon {
            font-size: 3em;
            margin-bottom: 12px;
        }

        /* Toast */
        #toast {
            position: fixed;
            top: 80px;
            right: 20px;
            z-index: 9999;
            pointer-events: none;
        }

        .toast-item {
            background: linear-gradient(135deg, var(--sakura-pink), var(--sakura-purple));
            color: #fff;
            font-weight: 700;
            font-size: 12px;
            padding: 10px 18px;
            border-radius: var(--radius-sm);
            margin-bottom: 8px;
            box-shadow: 0 6px 20px rgba(244, 114, 182, 0.3);
            animation: toastIn 0.3s ease;
        }

        .toast-item.error {
            background: linear-gradient(135deg, #ef4444, #dc2626);
            box-shadow: 0 6px 20px rgba(239, 68, 68, 0.3);
        }

        @keyframes toastIn {
            from {
                opacity: 0;
                transform: translateX(30px);
            }

            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        /* ===== 响应式 ===== */
        @media (max-width: 768px) {
            .sidebar {
                position: fixed;
                top: 0;
                bottom: 0;
                left: 0;
                transform: translateX(-100%);
            }

            .sidebar.open {
                transform: translateX(0);
            }

            .mobile-toggle {
                display: block;
            }

            .content-scroll {
                padding: 20px 16px;
            }

            .grid {
                grid-template-columns: 1fr;
            }

            .db-badge {
                display: none;
            }

            .sidebar-overlay {
                position: fixed;
                inset: 0;
                background: rgba(0, 0, 0, 0.5);
                z-index: 49;
                display: none;
            }

            .sidebar-overlay.show {
                display: block;
            }
        }

        @media (min-width: 769px) and (max-width: 1200px) {
            .grid {
                grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
            }
        }
    </style>
</head>

            <a href="mailto:2902939692@qq.com"><i class="fa-solid fa-envelope"></i> 投稿: 2902939692</a>
        </div>
    </aside>

    <!-- 主内容 -->
    <main class="main-area">
        <header class="top-bar">
            <button class="mobile-toggle" onclick="toggleSidebar()"><i class="fa-solid fa-bars"></i></button>
            <div class="search-wrap">
                <i class="fa-solid fa-search"></i>
                <input type="text" id="search" placeholder="搜索 320+ 资源 (Ctrl+K)...">
            </div>
            <div class="top-actions">
                <button onclick="randomSite()" title="手气不错"><i class="fa-solid fa-dice"></i></button>
                <span class="db-badge">DB: <span class="num" id="total-db">0</span></span>
            </div>
        </header>

        <div class="content-scroll" id="content-area">
            <h2 class="cat-title" id="cat-title"><i class="fa-solid fa-layer-group"></i> 全部资源</h2>
            <div class="grid" id="grid"></div>
        </div>
    </main>

    <div id="toast"></div>

    <script>
        // ===== 全局 =====
        let db = [];
        let currentCategory = 'all';

        const CAT_NAMES = {
            all: '全部资源', movies: '影视与聚合', anime: '动漫与漫画',
            games: '游戏与模拟', music: '音乐与有声', iptv: '直播与IPTV',
            tools: '软件与工具', ai: '人工智能', dev: '开发与编程',
            design: '设计与素材', android: '安卓发烧友', privacy: '隐私与安全', pan: '网盘与资源'
        };

        // ===== 初始化 =====
        async function init() {
            try {
                const resp = await fetch('data.json');
                if (!resp.ok) throw new Error('加载失败');
                db = await resp.json();
                document.getElementById('total-db').innerText = db.length;
                updateCounts();
                render(db);
                setupSearch();
                document.addEventListener('keydown', e => {
                    if ((e.ctrlKey || e.metaKey) && e.key === 'k') { e.preventDefault(); document.getElementById('search').focus(); }
                });
                setTimeout(() => document.getElementById('loading-overlay').classList.add('hidden'), 400);
            } catch (err) {
                console.error(err);
                showToast('加载失败，请刷新页面', true);
                document.getElementById('loading-overlay').classList.add('hidden');
            }
        }

        function updateCounts() {
            const counts = {};
            db.forEach(it => counts[it.c] = (counts[it.c] || 0) + 1);
            const allEl = document.getElementById('c-all');
            if (allEl) allEl.innerText = db.length;
            for (let c in counts) {
                const el = document.getElementById('c-' + c);
                if (el) el.innerText = counts[c];
            }
        }

        // ===== 分类 =====
        function filter(cat, btn) {
            currentCategory = cat;
            const list = cat === 'all' ? db : db.filter(i => i.c === cat);

            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            if (btn) btn.classList.add('active');

            if (window.innerWidth < 768) closeSidebar();

            document.getElementById('cat-title').innerHTML =
                `<i class="fa-solid fa-layer-group"></i> ${CAT_NAMES[cat] || '搜索结果'} <span class="cat-count">(${list.length})</span>`;
            render(list);
        }

        // ===== 渲染 =====
        function render(list) {
            const grid = document.getElementById('grid');
            if (!list.length) {
                grid.innerHTML = '<div class="empty"><div class="icon">🌸</div><p>未找到相关资源</p></div>';
                return;
            }
            grid.innerHTML = list.map((it, i) => {
                const badge = it.badge ? `<span class="badge ${getBadgeClass(it.badge)}">${esc(it.badge)}</span>` : '';
                return `
                <div class="card" style="animation-delay:${Math.min(i * 0.03, 0.6)}s" onclick="openLink('${esc(it.u)}')">
                    ${badge}
                    <div class="card-top">
                        <div class="card-icon"><i class="fa-solid ${it.i}"></i></div>
                        <div class="card-name">${esc(it.t)}</div>
                    </div>
                    <p class="card-desc">${esc(it.d)}</p>
                    <div class="card-bottom">
                        <span class="card-cat">#${it.c.toUpperCase()}</span>
                        <div class="card-actions">
                            <span onclick="copyLink('${esc(it.u)}', event)" title="复制链接"><i class="fa-regular fa-copy"></i></span>
                            <span><i class="fa-solid fa-arrow-up-right-from-square"></i></span>
                        </div>
                    </div>
                </div>`;
            }).join('');
        }

        // ===== 工具 =====
        function esc(s) { const d = document.createElement('div'); d.textContent = s || ''; return d.innerHTML; }

        function openLink(url) { window.open(url, '_blank', 'noopener,noreferrer'); }

        function getBadgeClass(b) {
            if (['热门', '神器', '必藏', '神站'].includes(b)) return 'badge-hot';
            if (['新锐', 'FOSS', '推荐', '源头', '必读'].includes(b)) return 'badge-good';
            return 'badge-other';
        }

        function joinQQ() {
            const mobile = /Android|iPhone/i.test(navigator.userAgent);
            const url = mobile
                ? 'mqqapi://card/show_pslcard?src_type=internal&version=1&uin=691105381&card_type=group&source=qrcode'
                : 'https://qm.qq.com/q/cY9CE78ZMs';
            mobile ? (location.href = url) : window.open(url, '_blank');
            showToast('正在前往官方社区...');
        }

        function copyLink(url, e) {
            e.stopPropagation();
            navigator.clipboard.writeText(url)
                .then(() => showToast('链接已复制'))
                .catch(() => showToast('复制失败', true));
        }

        function showToast(msg, isErr) {
            const t = document.createElement('div');
            t.className = 'toast-item' + (isErr ? ' error' : '');
            t.textContent = msg;
            document.getElementById('toast').appendChild(t);
            setTimeout(() => t.remove(), 2200);
        }

        function randomSite() {
            if (!db.length) { showToast('数据加载中...', true); return; }
            const r = db[Math.floor(Math.random() * db.length)];
            showToast('正在前往: ' + r.t);
            setTimeout(() => window.open(r.u, '_blank'), 500);
        }

        // ===== 搜索 =====
        function setupSearch() {
            document.getElementById('search').addEventListener('input', e => {
                const v = e.target.value.toLowerCase().trim();
                if (!v) { filter(currentCategory, document.querySelector('.nav-btn.active')); return; }
                const list = db.filter(i => i.t.toLowerCase().includes(v) || i.d.toLowerCase().includes(v));
                document.getElementById('cat-title').innerHTML =
                    `<i class="fa-solid fa-magnifying-glass"></i> 搜索结果 <span class="cat-count">(${list.length})</span>`;
                render(list);
            });
        }

        // ===== 移动端侧边栏 =====
        function toggleSidebar() {
            document.getElementById('sidebar').classList.toggle('open');
            document.getElementById('overlay').classList.toggle('show');
        }
        function closeSidebar() {
            document.getElementById('sidebar').classList.remove('open');
            document.getElementById('overlay').classList.remove('show');
        }

        // 启动
        init();
    </script>
</body>

</html>
